<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/dist/output.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="/dist/output.css" rel="stylesheet">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <title>Document</title>
</head>

<body class="bg-gradient-to-l from-sky-400 to-indigo-900">

    <header class="flex justify-center mx-auto">
        <img class="flex justify-center rounded-full w-24 h-24 mt-12"
            src="https://pbs.twimg.com/profile_images/1617779595641487362/40og3s5w_400x400.jpg" alt="" />
    </header>
    <h1 class="font-mono text-center flex justify-center m-6 mx-auto text-white font-bold">Full-Stack Software Engineer
    </h1>

    <div class="container mx-auto mt-10">
        <a class="flex items-center mb-4 mx-8 md:w-3/5 md:mx-auto h-14 p-2 bg-blue-500 text-white rounded hover:animate-bounce"
            target="_blank" href="https://djneill.com/">
            <i class="ml-4 fa fa-code fa-2x"></i>
            <p class="font-mono text-center flex-grow mx-auto mr-12">Portfolio</p>
        </a>

        <a class="flex items-center mb-4 mx-8 md:w-3/5 md:mx-auto h-14 p-2 bg-blue-500 text-white rounded hover:animate-bounce"
            target="_blank" href="https://github.com/djneill">
            <i class="ml-4 fa-brands fa-github fa-2x"></i>
            <p class="font-mono text-center flex-grow mx-auto mr-12">GitHub</p>
        </a>

        <a class="flex items-center mb-4 mx-8 md:w-3/5 md:mx-auto h-14 p-2 bg-blue-500 text-white rounded hover:animate-bounce"
            target="_blank" href="https://www.linkedin.com/in/dj-neill/">
            <i class="ml-4 fa-brands fa-linkedin fa-2x"></i>
            <p class="font-mono text-center flex-grow mx-auto mr-12">LinkedIn</p>
        </a>

        <a class="flex items-center mb-4 mx-8 md:w-3/5 md:mx-auto h-14 p-2 bg-blue-500 text-white rounded hover:animate-bounce"
            target="_blank" href="https://twitter.com/CodingGuitarist">
            <i class="ml-4 fa-brands fa-twitter fa-2x"></i>
            <p class="font-mono text-center flex-grow mx-auto mr-12">Twitter</p>
        </a>

        <div id="shareButton"
            class="cursor-pointer flex items-center mb-4 mx-8 md:w-3/5 md:mx-auto h-14 p-2 bg-blue-500 text-white rounded hover:animate-bounce hover:shadow-lg" onclick="copyLink()">
            <i class="ml-4 fas fa-share fa-2x"></i>
            <p class="font-mono text-center flex-grow mx-auto mr-12">Forward This Tree</p>
        </div>
    </div>


    <script src="tailwind.config.js"></script>
    <script src="js/main.js"></script>


</body>

</html>
